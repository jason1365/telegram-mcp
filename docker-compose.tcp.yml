version: '3.8'

services:
  telegram-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram-mcp-tcp
    # Load environment variables from a .env file in the same directory
    env_file:
      - .env
    # Port mapping for TCP mode - exposed for network access
    ports:
      - "${MCP_SERVER_PORT:-8765}:${MCP_SERVER_PORT:-8765}"
    # TCP mode requires network access
    environment:
      - MCP_SERVER_MODE=tcp
      - MCP_SERVER_HOST=0.0.0.0
    restart: unless-stopped